<div class="admin-layout" [class.colapsado]="sidebarColapsado && !isMobile" [class.mobile-open]="mobileAbierto">

  <!-- Botón hamburguesa flotante (solo móvil) -->
  <button
    type="button"
    class="mobile-toggle"
    *ngIf="isMobile"
    (click)="toggleSidebar()"
    [class.is-open]="mobileAbierto"
    aria-label="Abrir menú">
    <i class="fas fa-bars"></i>
  </button>

  <!-- Overlay para móvil -->
  <div class="sidebar-overlay" *ngIf="isMobile && mobileAbierto" (click)="cerrarSidebarMovil()"></div>

  <aside class="sidebar">
    <!-- Header -->
    <div class="sidebar-header">
      <div class="header-logo" *ngIf="!sidebarColapsado">
        <img src="/img/escudo-admin.svg" alt="Escudo Administrador" class="escudo-img" />
        <div class="header-text">
          <h3>Panel Admin</h3>
          <span class="header-subtitle">Inmobiliaria Ivan</span>
        </div>
      </div>

      <div class="header-collapsed" *ngIf="sidebarColapsado">
        <img src="/img/escudo-admin.svg" alt="Escudo Administrador" class="escudo-img escudo-img--sm" />
      </div>

      <button
        type="button"
        class="toggle-btn"
        (click)="toggleSidebar()"
        [attr.aria-label]="sidebarColapsado ? 'Expandir menú' : 'Colapsar menú'"
        [title]="sidebarColapsado ? 'Expandir menú' : 'Colapsar menú'">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <!-- Navegación -->
    <nav class="nav-menu" aria-label="Menú principal">
      <ul>
        <!-- Dashboard -->
        <li class="nav-item">
          <a
            routerLink="dashboard"
            routerLinkActive="active"
            [attr.data-tooltip]="'Dashboard'"
            (click)="cerrarSidebarMovil()">
            <span class="nav-icon"><i class="fas fa-tachometer-alt"></i></span>
            <span class="nav-label">Dashboard</span>
            <span class="nav-indicator"></span>
          </a>
        </li>

        <!-- Gestión Usuarios -->
        <li class="nav-item">
          <a
            routerLink="gestion-usuarios"
            routerLinkActive="active"
            [attr.data-tooltip]="'Gestión Usuarios'"
            (click)="cerrarSidebarMovil()">
            <span class="nav-icon"><i class="fas fa-users-cog"></i></span>
            <span class="nav-label">Gestión Usuarios</span>
            <span class="nav-indicator"></span>
          </a>
        </li>

        <!-- Anulaciones (submenu) -->
        <li class="nav-item has-submenu" [class.open]="anulacionesExpandido">
          <a
            href="javascript:void(0)"
            (click)="toggleAnulaciones()"
            [attr.data-tooltip]="'Anulaciones'">
            <span class="nav-icon"><i class="fas fa-ban"></i></span>
            <span class="nav-label">Anulaciones</span>
            <span class="nav-arrow">
              <i class="fas fa-chevron-right"></i>
            </span>
          </a>
          <ul class="submenu">
            <li>
              <a
                routerLink="anulaciones/letras"
                routerLinkActive="active"
                (click)="cerrarSidebarMovil()">
                <span class="submenu-icon"><i class="fas fa-file-invoice-dollar"></i></span>
                <span class="nav-label">Pagos Letras</span>
              </a>
            </li>
            <li>
              <a
                routerLink="anulaciones/moras"
                routerLinkActive="active"
                (click)="cerrarSidebarMovil()">
                <span class="submenu-icon"><i class="fas fa-exclamation-triangle"></i></span>
                <span class="nav-label">Pagos Moras</span>
              </a>
            </li>
            <li>
              <a
                routerLink="anulaciones/iniciales"
                routerLinkActive="active"
                (click)="cerrarSidebarMovil()">
                <span class="submenu-icon"><i class="fas fa-hand-holding-usd"></i></span>
                <span class="nav-label">Pagos Iniciales</span>
              </a>
            </li>
            <li>
              <a
                routerLink="anulaciones/inscripciones"
                routerLinkActive="active"
                (click)="cerrarSidebarMovil()">
                <span class="submenu-icon"><i class="fas fa-bolt"></i></span>
                <span class="nav-label">Pagos Servicios</span>
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </nav>

    <!-- Footer -->
    <div class="sidebar-footer">
      <div class="theme-toggle"
           (click)="themeSvc.toggle()"
           [class.active]="(themeSvc.isActive$ | async)"
           [title]="(themeSvc.isActive$ | async) ? 'Modo claro' : 'Modo oscuro'">
        <i class="fas" [ngClass]="(themeSvc.isActive$ | async) ? 'fa-sun' : 'fa-moon'"></i>
        <span class="nav-label">{{ (themeSvc.isActive$ | async) ? 'Modo Claro' : 'Modo Oscuro' }}</span>
      </div>
      <div class="user-card">
        <div class="user-avatar">
          <i class="fas fa-user-shield"></i>
        </div>
        <div class="user-info">
          <span class="user-name">Administrador</span>
          <span class="user-role">Super Admin</span>
        </div>
      </div>
      <button
        type="button"
        class="btn-logout"
        (click)="cerrarSesion()"
        data-tooltip="Cerrar Sesión">
        <span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span>
        <span class="nav-label">Cerrar Sesión</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
