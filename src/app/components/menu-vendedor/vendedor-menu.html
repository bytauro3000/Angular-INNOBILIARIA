<div class="vendedor-layout">
  <aside class="vendedor-sidebar">
    <div class="vendedor-brand">
      <img src="img/logo.png" alt="Logo" class="vendedor-logo">
      <span class="vendedor-brand-name">Inmobiliaria Ivan</span>
    </div>

    <div class="vendedor-user">
      <div class="vendedor-user-avatar">{{ usuarioLogueado?.nombre?.charAt(0) || '?' }}</div>
      <div class="vendedor-user-info">
        <span class="vendedor-user-name">{{ usuarioLogueado?.nombre }}</span>
        <span class="vendedor-user-role">Vendedor</span>
      </div>
    </div>

    <nav class="vendedor-nav">
      <a [routerLink]="['/vendedor-menu/']" routerLinkActive="active">
        <i class="bi bi-grid-3x3-gap-fill"></i>
        <span>Panel de Lotes</span>
      </a>
    </nav>

    <div class="vendedor-nav-footer">
      <a (click)="onLogout()" class="vendedor-logout">
        <i class="bi bi-box-arrow-right"></i>
        <span>Cerrar Sesión</span>
      </a>
    </div>
  </aside>

  <main class="vendedor-content">
    <router-outlet></router-outlet>
  </main>
</div>
