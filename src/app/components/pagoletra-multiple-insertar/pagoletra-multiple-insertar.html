<div class="modal fade" #modalElement tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg">
      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-cash-stack"></i> Pagar {{ letras.length }} letras
        </h5>
        <button type="button" class="btn-close" (click)="cerrarModal()" aria-label="Cerrar"></button>
      </div>

      <div class="modal-body">
        <div class="info-letra" *ngIf="letras.length > 0">
          <div class="info-item" style="grid-column: 1 / -1;">
            <label>Letras a pagar:</label>
            <div class="info-value">
              <ul class="lista-letras">
                <li *ngFor="let l of letras">
                  {{ getNumeroLetraLimpio(l.numeroLetra) }} - {{contrato?.moneda === 'PEN' ? 'S/.' : '$'}} {{l.importe | number:'1.2-2'}}
                </li>
              </ul>
            </div>
          </div>
          <div class="info-item" style="grid-column: 1 / -1; margin-top: 8px;">
            <label>Importe Total</label>
            <p class="info-value total-importe">{{contrato?.moneda === 'PEN' ? 'S/.' : '$'}} {{importeTotal | number:'1.2-2'}}</p>
          </div>
        </div>

        <form #form="ngForm">
          <div class="form-row form-2-col">
            <div class="form-group">
              <label for="medioPago">Medio de Pago *</label>
              <select id="medioPago" class="form-select" [(ngModel)]="datosComunes.medioPago"
                      name="medioPago" required (change)="onMedioPagoChange()">
                <option *ngFor="let opcion of medioPagoOptions" [value]="opcion">{{ opcion }}</option>
              </select>
            </div>
            <div class="form-group">
              <label for="numeroOperacion">N° Operación <span *ngIf="datosComunes.medioPago !== 'EFECTIVO'">*</span></label>
              <input type="text" id="numeroOperacion" class="form-control"
                     [(ngModel)]="datosComunes.numeroOperacion" name="numeroOperacion"
                     [disabled]="datosComunes.medioPago === 'EFECTIVO'">
            </div>
          </div>

          <div class="form-row form-2-col">
            <div class="form-group">
              <label for="fechaOperacion">Fecha Operación *</label>
              <input type="date" id="fechaOperacion" class="form-control"
                     [(ngModel)]="datosComunes.fechaOperacion" name="fechaOperacion" required>
            </div>
            <div class="form-group">
              <label for="tipoComprobante">Tipo Comprobante *</label>
              <select id="tipoComprobante" class="form-select" [(ngModel)]="datosComunes.tipoComprobante"
                      name="tipoComprobante" (change)="onTipoComprobanteChange()" required>
                <option [ngValue]="undefined">-- Seleccione --</option>
                <option *ngFor="let opcion of tipoComprobanteOptions" [value]="opcion">{{ opcion }}</option>
              </select>
            </div>
          </div>

          <div class="form-row form-2-col">
            <div class="form-group">
              <label for="numeroComprobantePreview">
                N° Comprobante
                <span class="badge-manual" *ngIf="modoManualComprobante">Manual</span>
              </label>
              <div class="input-group">
                <input type="text" id="numeroComprobantePreview" class="form-control"
                       [value]="cargandoPreview ? 'Generando...' : (modoManualComprobante ? numeroComprobanteManual : (numeroComprobantePreview || ''))"
                       [readonly]="!modoManualComprobante || cargandoPreview"
                       [class.input-manual]="modoManualComprobante"
                       (input)="onNumeroManualChange($event)"
                       [placeholder]="modoManualComprobante ? 'Ingrese N° comprobante' : (datosComunes.tipoComprobante ? 'Seleccione tipo primero' : 'Se asigna al guardar')"
                       [style.background-color]="modoManualComprobante ? 'white' : '#f8f9fa'"
                       [style.color]="modoManualComprobante ? '#1e293b' : '#6c757d'"
                       [style.cursor]="modoManualComprobante ? 'text' : 'default'">
                <span class="input-group-text btn-toggle-manual"
                      (click)="toggleModoManual()"
                      [title]="modoManualComprobante ? 'Volver al número automático' : 'Ingresar número manualmente'"
                      [class.active]="modoManualComprobante">
                  <span *ngIf="cargandoPreview" class="spinner-border spinner-border-sm text-secondary"></span>
                  <i *ngIf="!cargandoPreview && modoManualComprobante" class="bi bi-pencil-fill text-primary"></i>
                  <i *ngIf="!cargandoPreview && !modoManualComprobante" class="bi bi-pencil text-secondary"></i>
                </span>
              </div>

            </div>
          </div>

          <div class="form-row">
            <div class="form-group width-100">
              <label for="observaciones">Observaciones</label>
              <textarea id="observaciones" class="form-control" rows="2"
                        [(ngModel)]="datosComunes.observaciones" name="observaciones"></textarea>
            </div>
          </div>

          <div class="form-row mb-0">
            <div class="form-group width-100">
              <label>Voucher (imagen) <span *ngIf="datosComunes.medioPago !== 'EFECTIVO'">*</span></label>
              <app-voucher-preview
                [(ngModel)]="voucherFiles"
                [disabled]="datosComunes.medioPago === 'EFECTIVO'"
                name="vouchers">
              </app-voucher-preview>
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-cancel" (click)="cerrarModal()" [disabled]="enviando">Cancelar</button>
        <button type="submit" class="btn btn-save" (click)="guardar()" [disabled]="enviando">
          <span *ngIf="enviando" class="spinner-border spinner-border-sm me-2"></span>
          {{ enviando ? 'Procesando...' : 'Pagar letras' }}
        </button>
      </div>
    </div>
  </div>
</div>
