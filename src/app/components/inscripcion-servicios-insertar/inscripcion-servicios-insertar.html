<div class="modal-overlay" *ngIf="estaAbierto" (click)="cerrarModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="modal-header">
      <h5>
        <i class="bi bi-plug-fill me-2"></i>
        Inscripción de Servicio — Contrato #{{ idContrato }}
      </h5>
      <button class="btn-close-custom" (click)="cerrarModal()">&times;</button>
    </div>

    <!-- Body -->
    <div class="modal-body">

      <!-- Tipo de servicio -->
      <div class="form-section">
        <label class="section-label">Tipo de Servicio <span class="req">*</span></label>
        <div class="servicio-selector">
          <label class="servicio-card" [class.selected]="tipoServicio === TipoServicios.LUZ"
                 (click)="tipoServicio = TipoServicios.LUZ">
            <span class="servicio-icon">⚡</span>
            <span class="servicio-name">LUZ</span>
          </label>
          <label class="servicio-card" [class.selected]="tipoServicio === TipoServicios.AGUA"
                 (click)="tipoServicio = TipoServicios.AGUA">
            <span class="servicio-icon">💧</span>
            <span class="servicio-name">AGUA</span>
          </label>
        </div>
      </div>

      <!-- Fila: Monto + Fecha -->
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">
            Monto (USD) <span class="req">*</span>
            <span class="hint">Editable para pagos parciales</span>
          </label>
          <div class="input-prefix-group">
            <span class="input-prefix">$</span>
            <input type="number" step="0.01" min="1" class="form-control"
                   [(ngModel)]="montoPagado" name="montoPagado"
                   placeholder="150.00">
          </div>
          <p class="field-note">Monto estándar: $150.00. Modifique si el cliente paga en partes.</p>
        </div>

        <div class="form-group">
          <label class="form-label">Fecha de Pago <span class="req">*</span></label>
          <input type="date" class="form-control"
                 [(ngModel)]="fechaPago" name="fechaPago">
        </div>
      </div>

      <!-- Fila: Medio de pago + Número de operación -->
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Medio de Pago <span class="req">*</span></label>
          <select class="form-select"
                  [(ngModel)]="medioPago" name="medioPago"
                  (change)="onMedioPagoChange()">
            <option *ngFor="let op of medioPagoOptions" [value]="op">{{ op }}</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">
            N° Operación
            <span class="req" *ngIf="medioPago !== 'EFECTIVO'">*</span>
          </label>
          <input type="text" class="form-control"
                 [(ngModel)]="numeroOperacion" name="numeroOperacion"
                 [disabled]="medioPago === 'EFECTIVO'"
                 [placeholder]="medioPago === 'EFECTIVO' ? 'N/A — pago en efectivo' : 'Ingrese N° de operación'">
        </div>
      </div>

      <!-- Fila: Tipo comprobante + Número comprobante -->
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">Tipo de Comprobante <span class="req">*</span></label>
          <select class="form-select"
                  [(ngModel)]="tipoComprobante" name="tipoComprobante"
                  (change)="onTipoComprobanteChange()">
            <option [ngValue]="undefined">-- Seleccione --</option>
            <option *ngFor="let op of tipoComprobanteOptions" [value]="op">{{ op }}</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">
            N° Comprobante
            <span class="badge-manual" *ngIf="modoManualComprobante">Manual</span>
          </label>
          <div class="input-group-comprobante">
            <input type="text" class="form-control"
                   [value]="cargandoPreview ? 'Calculando...'
                            : (modoManualComprobante ? numeroComprobanteManual
                            : (numeroComprobantePreview || '—'))"
                   [readonly]="!modoManualComprobante || cargandoPreview"
                   [class.input-manual]="modoManualComprobante"
                   (input)="onNumeroManualChange($event)"
                   [placeholder]="modoManualComprobante ? 'Ingrese N° comprobante'
                                  : (tipoComprobante ? 'Calculando...' : '—')"
                   [style.background-color]="modoManualComprobante ? 'white' : '#f8f9fa'"
                   [style.color]="modoManualComprobante ? '#1e293b' : '#6c757d'">
            <button type="button" class="btn-toggle-manual"
                    (click)="toggleModoManual()"
                    [class.active]="modoManualComprobante"
                    [title]="modoManualComprobante ? 'Volver al número automático' : 'Ingresar número manualmente'">
              <span *ngIf="cargandoPreview" class="spinner-border spinner-border-sm"></span>
              <i *ngIf="!cargandoPreview && modoManualComprobante"  class="bi bi-pencil-fill text-primary"></i>
              <i *ngIf="!cargandoPreview && !modoManualComprobante" class="bi bi-pencil text-secondary"></i>
            </button>
          </div>
        </div>
      </div>

      <!-- Observaciones -->
      <div class="form-group">
        <label class="form-label">Observaciones</label>
        <textarea class="form-control" rows="2"
                  [(ngModel)]="observaciones" name="observaciones"
                  [placeholder]="'Inscripción de servicio de ' + tipoServicio + ' — Contrato #' + idContrato">
        </textarea>
      </div>

    </div><!-- /modal-body -->

    <!-- Footer -->
    <div class="modal-footer">
      <button type="button" class="btn btn-cancelar" (click)="cerrarModal()" [disabled]="loading">
        Cancelar
      </button>
      <button type="button" class="btn btn-confirmar" [disabled]="loading" (click)="confirmarInscripcion()">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        <ng-container *ngIf="!loading">
          <i class="bi bi-check2-circle me-1"></i>
          Registrar y Generar Comprobante
        </ng-container>
        <ng-container *ngIf="loading">Procesando...</ng-container>
      </button>
    </div>

  </div>
</div>
