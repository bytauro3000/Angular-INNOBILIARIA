<div class="login-container">
    <form (ngSubmit)="onLogin()">
        <div class="input-group-modern">
            <i class="fas fa-envelope input-icon-modern"></i>
            <input type="email" name="correo" [(ngModel)]="loginRequest.correo"
                   class="form-control-modern input-correo" placeholder="Correo Electrónico" required autocomplete="email">
        </div>

        <div class="input-group-modern">
            <i class="fas fa-lock input-icon-modern"></i>
            <input [type]="verContrasena ? 'text' : 'password'"
                   name="contrasena" [(ngModel)]="loginRequest.contrasena"
                   class="form-control-modern" placeholder="Contraseña" required autocomplete="current-password">
            <i class="fas eye-icon" [ngClass]="verContrasena ? 'fa-eye-slash' : 'fa-eye'" (click)="togglePassword()"></i>
        </div>

        <div class="extra-options-container">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe" name="recordar" [(ngModel)]="recordar">
                <label class="form-check-label" for="rememberMe">Recuérdame</label>
            </div>
            <a href="#" class="forgot-password-link" (click)="$event.preventDefault()">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
        </button>
    </form>
</div>
