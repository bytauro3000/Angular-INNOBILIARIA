<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c2247"/>
      <stop offset="100%" stop-color="#131838"/>
    </linearGradient>
  </defs>

  <!-- Sombra del escudo -->
  <path d="M32 4 L56 14 L56 30 C56 44 46 54 32 60 C18 54 8 44 8 30 L8 14 Z"
        fill="rgba(0,0,0,0.25)"
        transform="translate(0,2)"/>

  <!-- Escudo principal -->
  <path d="M32 4 L56 14 L56 30 C56 44 46 54 32 60 C18 54 8 44 8 30 L8 14 Z"
        fill="url(#shieldGrad)"
        stroke="rgba(255,255,255,0.2)"
        stroke-width="1"/>

  <!-- Brillo superior -->
  <path d="M32 4 L56 14 L56 20 L32 10 Z"
        fill="rgba(255,255,255,0.18)"/>

  <!-- Interior oscuro -->
  <path d="M32 12 L50 19 L50 30 C50 41 42 49 32 54 C22 49 14 41 14 30 L14 19 Z"
        fill="url(#innerGrad)"/>

  <!-- Corona de admin (estrella) -->
  <polygon points="32,18 34.2,23 39.5,23 35.3,26.2 37,31 32,28 27,31 28.7,26.2 24.5,23 29.8,23"
           fill="#fbbf24"
           stroke="#f59e0b"
           stroke-width="0.5"/>

  <!-- Llave (símbolo de admin) -->
  <circle cx="32" cy="38" r="4" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <line x1="35.2" y1="40.2" x2="40" y2="45" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="43" x2="40" y2="41" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="45" x2="38" y2="43" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
</svg>
